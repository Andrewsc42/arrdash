<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArrDash — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0D1117;
    --panel:    #161B22;
    --panel2:   #1C2330;
    --border:   #21282F;
    --teal:     #00D4AA;
    --teal-dim: rgba(0,212,170,0.12);
    --amber:    #F0A500;
    --red:      #E05252;
    --text:     #C9D1D9;
    --muted:    #6E7681;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow behind the card */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,212,170,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrap {
    width: 380px;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .logo-block {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal);
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--teal); }
    50% { opacity: 0.3; box-shadow: none; }
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.15em;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Card */
  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 32px;
    position: relative;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--teal);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* Form */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .field label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .field input {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--teal);
  }

  .field input::placeholder {
    color: var(--muted);
    opacity: 0.5;
  }

  /* Error */
  .error-msg {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    background: rgba(224,82,82,0.08);
    border: 1px solid rgba(224,82,82,0.2);
    padding: 8px 12px;
    margin-bottom: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* Submit */
  .btn-login {
    width: 100%;
    background: var(--teal);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-login:hover { opacity: 0.88; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .btn-login.loading .btn-spinner { display: block; }
  .btn-login.loading .btn-label { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Scanline effect */
  .login-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-block">
    <div class="logo-mark">
      <div class="logo-icon"><div class="logo-pulse"></div></div>
      <span class="logo-text">ARRDASH</span>
    </div>
    <div class="logo-sub">Unified Media Dashboard</div>
  </div>

  <div class="login-card">
    <div class="card-title">Sign in to continue</div>

    <div class="error-msg" id="error-msg">Invalid username or password</div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" autofocus>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="login-btn">
      <div class="btn-spinner"></div>
      <span class="btn-label">Sign In</span>
    </button>
  </div>

  <div class="login-footer">ArrDash · Local access only</div>
</div>

<script>
  const btn      = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');
  const userEl   = document.getElementById('username');
  const passEl   = document.getElementById('password');

  async function doLogin() {
    const username = userEl.value.trim();
    const password = passEl.value;

    if (!username || !password) {
      showError('Please enter your username and password');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    errorMsg.classList.remove('visible');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json();
        showError(data.error || 'Invalid username or password');
      }
    } catch {
      showError('Could not reach the server');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    passEl.value = '';
    passEl.focus();
  }

  btn.addEventListener('click', doLogin);

  // Submit on Enter
  [userEl, passEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
</script>
</body>
</html>
